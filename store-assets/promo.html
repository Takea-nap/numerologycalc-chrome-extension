<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NumerologyCalc Promo</title>
  <link rel="stylesheet" href="./store-assets.css">
</head>
<body>
  <main class="surface" style="width:440px;height:280px;">
    <section class="promo-layout">
      <div>
        <div class="eyebrow">
          <img src="../icons/icon32.png" alt="">
          <span>NumerologyCalc</span>
        </div>
        <h1 class="hero-title">Quick number calculator</h1>
        <p class="hero-copy">
          Life Path, Expression, Soul Urge & Personality in a lightweight popup.
        </p>
        <div class="promo-note">
          <span class="promo-chip">No extra permissions</span>
          <span class="promo-chip">Works offline</span>
        </div>
      </div>

      <aside class="popup-shell" aria-label="Extension popup preview">
        <header class="header">
          <img src="../icons/icon32.png" alt="" class="logo">
          <div>
            <h2 class="title">NumerologyCalc</h2>
            <p class="subtitle">Quick Number Calculator</p>
          </div>
        </header>

        <div class="tabs" role="tablist">
          <div class="tab active">Life Path</div>
          <div class="tab">Name Numbers</div>
        </div>

        <label class="label">Month</label>
        <div class="select">July</div>

        <label class="label">Day</label>
        <div class="select">9</div>

        <label class="label">Year</label>
        <div class="select">1985</div>

        <div class="btn">Calculate Life Path</div>
      </aside>
    </section>
  </main>
</body>
</html>
